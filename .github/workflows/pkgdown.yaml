# Build the pkgdown site on every push to main and publish it to the gh-pages
# branch. The SaqrServer cron (server-pull, gh-pages-static) then deploys that
# branch to https://pak.dynasite.org/psychnets/ within ~10 minutes.
# Standard r-lib/actions recipe: https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main]
  # Allow a manual rebuild from the Actions tab without a code change.
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only the deploy job needs write access; concurrency stops overlapping builds
    # racing to push gh-pages.
    concurrency:
      group: pkgdown-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
